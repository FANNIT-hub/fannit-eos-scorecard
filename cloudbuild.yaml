steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/eos-scorecard/eos-scorecard:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/eos-scorecard/eos-scorecard:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/eos-scorecard/eos-scorecard

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - eos-scorecard
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/eos-scorecard/eos-scorecard:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --timeout=300
      - --service-account=eos-scorecard-runtime@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/eos-scorecard/eos-scorecard:$COMMIT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/eos-scorecard/eos-scorecard:latest

options:
  logging: CLOUD_LOGGING_ONLY
